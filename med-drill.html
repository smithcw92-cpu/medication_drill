<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Medication Drill</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0e1117; color: #e8eaf0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh; padding: 20px;
    }

    header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 18px; flex-wrap: wrap; gap: 10px;
    }
    h1 { font-size: 1.3rem; color: #e8eaf0; font-weight: 700; }

    .stats {
      display: flex; gap: 16px; font-size: 0.82rem; color: #5a6380; flex-wrap: wrap;
    }
    .stat-val { color: #e8eaf0; font-weight: 700; }
    .stat-val.green  { color: #4caf7d; }
    .stat-val.orange { color: #ff9800; }

    .mode-toggle-wrapper {
      position: relative; max-width: 620px; margin-bottom: 16px;
    }
    .filter-toggle-row {
      display: none; align-items: center; margin-top: 6px;
    }
    .filter-toggle-btn {
      background: none; border: 1px solid #2a3050; border-radius: 6px;
      color: #5a6380; font-size: 0.76rem; font-weight: 600;
      padding: 4px 10px; cursor: pointer; transition: all 0.15s;
    }
    .filter-toggle-btn:hover { color: #9aa0b8; border-color: #3a4060; }
    .filter-toggle-btn.open { color: #e8eaf0; border-color: #4a5a8a; }
    .category-filters {
      position: absolute; top: calc(100% + 4px); left: 0; right: 0;
      display: flex; flex-wrap: wrap; gap: 6px;
      background: #131720; border: 1px solid #2a3050; border-radius: 8px;
      padding: 10px; z-index: 20;
    }
    .filter-btn {
      padding: 5px 12px; border-radius: 20px; border: 1px solid #2a3050;
      background: #1a1f2e; color: #5a6380; cursor: pointer;
      font-size: 0.76rem; font-weight: 600; transition: all 0.15s;
    }
    .filter-btn:hover { color: #9aa0b8; }
    .filter-btn.active { background: #2a3050; color: #e8eaf0; border-color: #3a4060; }
    .filter-btn.all-btn.active { background: #1a3050; border-color: #2a5080; color: #4a9fd4; }

    .mode-toggle {
      display: flex; gap: 6px;
    }
    .mode-btn {
      padding: 6px 14px; border-radius: 6px; border: 1px solid #2a3050;
      background: #1a1f2e; color: #5a6380; cursor: pointer;
      font-size: 0.8rem; font-weight: 600; transition: all 0.15s; flex: 1;
    }
    .mode-btn:hover { color: #9aa0b8; }
    .mode-btn.active { background: #2a3050; color: #e8eaf0; border-color: #4a5a8a; }

    .sub-toggle-row {
      display: none; gap: 6px; margin-top: 6px;
    }
    .sub-btn {
      padding: 5px 14px; border-radius: 6px; border: 1px solid #2a3050;
      background: #12151c; color: #5a6380; cursor: pointer;
      font-size: 0.76rem; font-weight: 600; transition: all 0.15s; flex: 1;
    }
    .sub-btn:hover { color: #9aa0b8; }
    .sub-btn.active { background: #1e2438; color: #c8cce0; border-color: #4a5a8a; }

    .hint-answer {
      font-size: 1.4rem; font-weight: 700; color: #e8eaf0;
      text-align: center; margin-bottom: 10px; padding-bottom: 10px;
      border-bottom: 1px solid #2a3050;
    }

    .main-card {
      background: #1a1f2e; border: 1px solid #2a3050;
      border-radius: 12px; padding: 32px 28px;
      max-width: 580px; margin: 0 auto;
    }

    .drug-name {
      font-size: 2.4rem; font-weight: 800; color: #e8eaf0;
      text-align: center; margin-bottom: 6px; letter-spacing: -0.5px;
    }
    .drug-brand {
      text-align: center; color: #4a5370; font-size: 0.85rem;
      margin-bottom: 28px; font-style: italic;
    }
    .prompt {
      font-size: 0.88rem; color: #5a6380; margin-bottom: 10px; text-align: center;
    }

    #answer-input {
      width: 100%; padding: 12px 16px;
      background: #0e1117; border: 1px solid #2a3050;
      border-radius: 8px; color: #e8eaf0; font-size: 1rem;
      outline: none; transition: border-color 0.15s; margin-bottom: 10px;
    }
    #answer-input:focus   { border-color: #4a5a8a; }
    #answer-input.correct { border-color: #4caf7d; }
    #answer-input.wrong   { border-color: #e05252; }

    .btn-check {
      width: 100%; padding: 11px; background: #2a3050;
      border: 1px solid #3a4060; border-radius: 8px;
      color: #aab0c4; cursor: pointer; font-size: 0.9rem;
      font-weight: 600; transition: background 0.15s; margin-bottom: 14px;
    }
    .btn-check:hover { background: #323d60; }

    .feedback {
      border-radius: 8px; padding: 14px 16px;
      font-size: 0.88rem; display: none; margin-bottom: 12px; line-height: 1.5;
    }
    .feedback.correct { background: #0d2a1a; border: 1px solid #2a6040; color: #4caf7d; display: block; }
    .feedback.wrong   { background: #2a1010; border: 1px solid #5a2020; color: #e07070; display: block; }

    .category-tag {
      display: inline-block; padding: 2px 9px; border-radius: 10px;
      font-size: 0.72rem; font-weight: 700; margin-left: 4px; vertical-align: middle;
    }
    .explanation {
      color: #8a90a8; font-size: 0.83rem; margin-top: 8px; line-height: 1.55;
    }

    .btn-next {
      width: 100%; padding: 11px; background: #1a3a2a;
      border: 1px solid #2a6040; border-radius: 8px;
      color: #4caf7d; cursor: pointer; font-size: 0.9rem;
      font-weight: 600; transition: background 0.15s; display: none;
    }
    .btn-next:hover { background: #1f4a32; }

    .progress-area {
      text-align: center; margin: 18px auto 0; max-width: 580px;
      font-size: 0.78rem; color: #3a4060;
    }
    .progress-bar  { height: 3px; background: #1a1f2e; border-radius: 2px; margin-top: 7px; }
    .progress-fill { height: 100%; background: #4caf7d; border-radius: 2px; transition: width 0.4s; width: 0%; }

    .all-done {
      text-align: center; padding: 48px 20px; color: #4caf7d; font-size: 1rem; line-height: 1.8;
    }

    /* Category tag colours */
    .cat-bt   { background: #2a0a0a; color: #e05252; border: 1px solid #5a1a1a; }
    .cat-ap   { background: #2a0f0f; color: #d47070; border: 1px solid #5a2020; }
    .cat-hbp  { background: #0a1525; color: #4a9fd4; border: 1px solid #1a3a5a; }
    .cat-dia  { background: #1a1a08; color: #c4a847; border: 1px solid #4a4a15; }
    .cat-psy  { background: #170a28; color: #9a70d4; border: 1px solid #3a1a5a; }
    .cat-sei  { background: #0a1a1a; color: #50c4b4; border: 1px solid #1a4a4a; }
    .cat-res  { background: #0a1a0a; color: #70c470; border: 1px solid #1a4a1a; }
    .cat-pai  { background: #2a1508; color: #d4843a; border: 1px solid #5a3315; }
    .cat-cho  { background: #0f1f0f; color: #60b460; border: 1px solid #254a25; }
    .cat-thy  { background: #10102a; color: #8888d4; border: 1px solid #303060; }
    .cat-gi   { background: #1a1a1a; color: #9090b4; border: 1px solid #383848; }
    .cat-all  { background: #2a1515; color: #d47878; border: 1px solid #5a2828; }
    .cat-crd  { background: #2a0808; color: #ff6b6b; border: 1px solid #6a1818; }
    .cat-ana  { background: #1a0a2a; color: #c084fc; border: 1px solid #4a1a6a; }
    .cat-rsi  { background: #08181a; color: #22d3ee; border: 1px solid #0e4a54; }
    .cat-tox  { background: #0a2010; color: #4ade80; border: 1px solid #1a5a2a; }
    .cat-hem  { background: #1a0818; color: #f472b6; border: 1px solid #5a1848; }

    .nw-protocol-toggle {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 8px;
    }
    .nw-btn {
      padding: 6px 16px; border-radius: 6px; border: 2px solid #2a5080;
      background: #0a1520; color: #4a9fd4; cursor: pointer;
      font-size: 0.8rem; font-weight: 700; transition: all 0.15s;
      letter-spacing: 0.02em;
    }
    .nw-btn:hover { border-color: #4a9fd4; color: #7abfe8; }
    .nw-btn.active { background: #1a3a5a; border-color: #4a9fd4; color: #e8f4ff; }

    .btn-show {
      width: 100%; padding: 8px; background: #12151c;
      border: 1px solid #2a3050; border-radius: 8px;
      color: #5a6380; cursor: pointer; font-size: 0.82rem;
      font-weight: 600; transition: all 0.15s; margin-bottom: 10px;
    }
    .btn-show:hover { background: #1a1f2e; color: #7a8299; }
    .hint-area {
      background: #1a1500; border: 1px solid #4a3a00;
      border-radius: 8px; padding: 12px 14px; margin-bottom: 10px;
      font-size: 0.85rem; color: #c4a847; line-height: 1.5;
    }
    .hint-area[hidden] { display: none; }
    .hint-area .explanation { color: #a09050; margin-top: 6px; }
    .retry-prompt { color: #9a6060; font-size: 0.8rem; margin-top: 8px; font-style: italic; }

    /* Batch completion panel */
    #batch-panel { display: none; }
    .batch-title  { font-size: 1.4rem; font-weight: 800; text-align: center; margin-bottom: 6px; }
    .batch-title.clean  { color: #4caf7d; }
    .batch-title.retry  { color: #e8c050; }
    .batch-perf   { text-align: center; color: #5a6380; font-size: 0.83rem; margin-bottom: 20px; }
    .batch-drugs  { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; margin-bottom: 24px; }
    .batch-drug-pill {
      padding: 4px 13px; background: #1a1f2e; border: 1px solid #2a3050;
      border-radius: 20px; font-size: 0.8rem; color: #9aa0b8;
    }
    .batch-options { display: flex; flex-direction: column; gap: 8px; }
    .bbtn {
      width: 100%; padding: 11px; border-radius: 8px; cursor: pointer;
      font-size: 0.9rem; font-weight: 600; transition: background 0.15s; border: none;
    }
    .bbtn-primary   { background: #1a3a2a; border: 1px solid #2a6040; color: #4caf7d; }
    .bbtn-primary:hover { background: #1f4a32; }
    .bbtn-secondary { background: #2a3050; border: 1px solid #3a4060; color: #aab0c4; }
    .bbtn-secondary:hover { background: #323d60; }
    .bbtn-tertiary  { background: #12151c; border: 1px solid #2a3050; color: #5a6380; font-size: 0.82rem; }
    .bbtn-tertiary:hover { background: #1a1f2e; color: #7a8299; }

    /* ── Sort mode ──────────────────────────────────────────────────────────── */
    #sort-panel { display: none; max-width: 620px; margin: 0 auto; }
    .sort-filter-row {
      display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px;
    }
    .sort-filter-btn {
      padding: 5px 12px; border-radius: 20px; border: 1px solid #2a3050;
      background: #1a1f2e; color: #5a6380; cursor: pointer;
      font-size: 0.76rem; font-weight: 600; transition: all 0.15s;
    }
    .sort-filter-btn:hover { color: #9aa0b8; }
    .sort-filter-btn.active { background: #2a3050; color: #e8eaf0; border-color: #3a4060; }
    .sort-filter-btn.all-btn.active { background: #1a3050; border-color: #2a5080; color: #4a9fd4; }

    .sort-drug-card {
      background: #1a1f2e; border: 1px solid #2a3050; border-radius: 12px;
      padding: 28px; text-align: center; margin-bottom: 14px;
    }
    .sort-drug-name  { font-size: 2rem; font-weight: 800; color: #e8eaf0; margin-bottom: 4px; }
    .sort-drug-brand { font-size: 1.1rem; color: #6a7390; font-style: italic; }
    .sort-prompt     { font-size: 0.82rem; color: #5a6380; margin-top: 8px; }

    .sort-grid {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 14px;
    }
    .sort-cat-btn {
      padding: 10px 8px; border-radius: 8px; border: 1px solid #2a3050;
      background: #1a1f2e; color: #8a90a8; cursor: pointer;
      font-size: 0.78rem; font-weight: 600; text-align: center;
      transition: all 0.15s; line-height: 1.3;
    }
    .sort-cat-btn:hover:not(:disabled) { background: #232a40; color: #c8cce0; border-color: #3a4060; }
    .sort-cat-btn.correct { background: #0d2a1a; border-color: #2a6040; color: #4caf7d; }
    .sort-cat-btn.wrong   { background: #2a1010; border-color: #5a2020; color: #e07070; }
    .sort-cat-btn:disabled { cursor: default; }

    .sort-feedback {
      border-radius: 8px; padding: 12px 16px; font-size: 0.85rem;
      margin-bottom: 12px; display: none; line-height: 1.5;
    }
    .sort-feedback.correct { background: #0d2a1a; border: 1px solid #2a6040; color: #4caf7d; display: block; }
    .sort-feedback.wrong   { background: #2a1010; border: 1px solid #5a2020; color: #e07070; display: block; }

    .sort-next-btn {
      width: 100%; padding: 11px; background: #1a3a2a;
      border: 1px solid #2a6040; border-radius: 8px;
      color: #4caf7d; cursor: pointer; font-size: 0.9rem;
      font-weight: 600; transition: background 0.15s; display: none;
    }
    .sort-next-btn:hover { background: #1f4a32; }

    @media (max-width: 480px) {
      .drug-name { font-size: 1.9rem; }
      .main-card { padding: 24px 18px; }
      .sort-grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>

<header>
  <h1>💊 Medication Drill</h1>
  <div class="stats">
    <span>Correct: <span class="stat-val green" id="val-correct">0</span>/<span class="stat-val" id="val-total">0</span></span>
    <span>Streak: <span class="stat-val orange" id="val-streak">0</span></span>
    <span>Mastered: <span class="stat-val" id="val-mastered">0</span></span>
  </div>
</header>

<div class="nw-protocol-toggle">
  <button class="nw-btn" id="nw-btn">🚑 NW Protocol Only</button>
</div>
<div class="mode-toggle-wrapper">
  <div class="mode-toggle" id="mode-toggle">
    <button class="mode-btn active" data-top="category">Learn Medications</button>
    <button class="mode-btn" data-top="names">Medication Names</button>
    <button class="mode-btn" data-top="sort">Medication Sort</button>
  </div>
  <div class="sub-toggle-row" id="sub-toggle">
    <button class="sub-btn active" data-mode="brand-to-generic">Brand → Generic</button>
    <button class="sub-btn" data-mode="generic-to-brand">Generic → Brand</button>
  </div>
  <div class="filter-toggle-row" id="filter-toggle-row">
    <button class="filter-toggle-btn" id="filter-toggle-btn">Filter by category ▾</button>
  </div>
  <div class="category-filters" id="filters" style="display:none">
    <button class="filter-btn all-btn active" data-cat="all">All</button>
    <button class="filter-btn" data-cat="Blood Thinner">🩸 Blood Thinners</button>
    <button class="filter-btn" data-cat="Antiplatelet">🫀 Antiplatelets</button>
    <button class="filter-btn" data-cat="Heart / BP">❤️ Heart / BP</button>
    <button class="filter-btn" data-cat="Diabetes">🩺 Diabetes</button>
    <button class="filter-btn" data-cat="Psychiatric">🧠 Psychiatric</button>
    <button class="filter-btn" data-cat="Seizure">⚡ Seizure</button>
    <button class="filter-btn" data-cat="Respiratory">😮‍💨 Respiratory</button>
    <button class="filter-btn" data-cat="Pain">💊 Pain</button>
    <button class="filter-btn" data-cat="Cholesterol">📊 Cholesterol</button>
    <button class="filter-btn" data-cat="Thyroid">🦋 Thyroid</button>
    <button class="filter-btn" data-cat="GI">🫃 GI / Stomach</button>
    <button class="filter-btn" data-cat="Allergy">🤧 Allergy</button>
    <button class="filter-btn" data-cat="Cardiac / Arrest">🚨 Cardiac / Arrest</button>
    <button class="filter-btn" data-cat="Analgesics">💊 Analgesics</button>
    <button class="filter-btn" data-cat="Sedation / RSI">😴 Sedation / RSI</button>
    <button class="filter-btn" data-cat="Tox / Metabolic">🧪 Tox / Metabolic</button>
    <button class="filter-btn" data-cat="Hemostasis / OB">🩸 Hemostasis / OB</button>
  </div>
</div>

<div class="main-card" id="main-card">
  <div class="drug-name"  id="drug-name">—</div>
  <div class="drug-brand" id="drug-brand"></div>
  <div class="prompt" id="drill-prompt">What is this drug used to treat?</div>
  <input type="text" id="answer-input"
    placeholder="Type your answer and press Enter…"
    autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
  <button class="btn-show"  id="show-btn">Show Answer</button>
  <div class="hint-area"   id="hint-area" hidden></div>
  <button class="btn-check" id="check-btn">Check Answer</button>
  <div class="feedback" id="feedback"></div>
  <button class="btn-next" id="next-btn">Next →</button>
</div>

<div class="main-card" id="batch-panel">
  <div class="batch-title" id="batch-title"></div>
  <div class="batch-perf"  id="batch-perf"></div>
  <div class="batch-drugs" id="batch-drugs"></div>
  <div class="batch-options">
    <button class="bbtn" id="next-batch-btn">Next 3 →</button>
    <button class="bbtn" id="review-batch-btn">↩ Review this batch</button>
    <button class="bbtn bbtn-tertiary" id="review-all-btn" style="display:none">Review all covered so far</button>
  </div>
</div>

<!-- ── Sort Mode Panel ───────────────────────────────────────────────────── -->
<div id="sort-panel">
  <div class="sort-filter-row" id="sort-filters">
    <button class="sort-filter-btn all-btn active" data-cat="all">All</button>
    <button class="sort-filter-btn" data-cat="Blood Thinner">🩸 Blood Thinners</button>
    <button class="sort-filter-btn" data-cat="Antiplatelet">🫀 Antiplatelets</button>
    <button class="sort-filter-btn" data-cat="Heart / BP">❤️ Heart / BP</button>
    <button class="sort-filter-btn" data-cat="Diabetes">🩺 Diabetes</button>
    <button class="sort-filter-btn" data-cat="Psychiatric">🧠 Psychiatric</button>
    <button class="sort-filter-btn" data-cat="Seizure">⚡ Seizure</button>
    <button class="sort-filter-btn" data-cat="Respiratory">😮‍💨 Respiratory</button>
    <button class="sort-filter-btn" data-cat="Pain">💊 Pain</button>
    <button class="sort-filter-btn" data-cat="Cholesterol">📊 Cholesterol</button>
    <button class="sort-filter-btn" data-cat="Thyroid">🦋 Thyroid</button>
    <button class="sort-filter-btn" data-cat="GI">🫃 GI / Stomach</button>
    <button class="sort-filter-btn" data-cat="Allergy">🤧 Allergy</button>
    <button class="sort-filter-btn" data-cat="Cardiac / Arrest">🚨 Cardiac / Arrest</button>
    <button class="sort-filter-btn" data-cat="Analgesics">💊 Analgesics</button>
    <button class="sort-filter-btn" data-cat="Sedation / RSI">😴 Sedation / RSI</button>
    <button class="sort-filter-btn" data-cat="Tox / Metabolic">🧪 Tox / Metabolic</button>
    <button class="sort-filter-btn" data-cat="Hemostasis / OB">🩸 Hemostasis / OB</button>
  </div>

  <div class="sort-drug-card" id="sort-drug-card">
    <div class="sort-drug-name"  id="sort-drug-name">—</div>
    <div class="sort-drug-brand" id="sort-drug-brand"></div>
    <div class="sort-prompt">Which category does this drug belong to?</div>
  </div>

  <div class="sort-grid" id="sort-grid"></div>
  <div class="sort-feedback" id="sort-feedback"></div>
  <button class="sort-next-btn" id="sort-next-btn">Next →</button>

  <div class="main-card" id="sort-batch-panel" style="display:none">
    <div class="batch-title" id="sort-batch-title"></div>
    <div class="batch-perf"  id="sort-batch-perf"></div>
    <div class="batch-drugs" id="sort-batch-drugs"></div>
    <div class="batch-options">
      <button class="bbtn" id="sort-next-batch-btn">Next 3 →</button>
      <button class="bbtn" id="sort-review-batch-btn">↩ Review this batch</button>
      <button class="bbtn bbtn-tertiary" id="sort-review-all-btn" style="display:none">Review all medications covered so far</button>
    </div>
  </div>
</div>

<div class="progress-area" id="progress-area">
  <span id="progress-text">0 of 70 mastered</span>
  <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
</div>

<script>
// ─── Drug database ────────────────────────────────────────────────────────────
// keywords: answer must contain at least one (case-insensitive)
// tagClass: CSS class for the coloured category pill
const DRUGS = [

  // BLOOD THINNERS (anticoagulants)
  { name:"Warfarin",        brand:"Coumadin",              category:"Blood Thinner", tag:"cat-bt",
    keys:["blood thinner","anticoagulant","clot","thin blood","coagul","bleeding","afib","dvt","embol"],
    note:"Anticoagulant — prevents and treats blood clots. Used for AFib, DVT, and pulmonary embolism. Patients bleed more easily." },
  { name:"Apixaban",        brand:"Eliquis",               category:"Blood Thinner", tag:"cat-bt",
    keys:["blood thinner","anticoagulant","clot","thin blood","coagul","bleeding","afib","dvt","embol"],
    note:"Blood thinner (anticoagulant) — one of the most common newer agents for AFib and DVT prevention." },
  { name:"Rivaroxaban",     brand:"Xarelto",               category:"Blood Thinner", tag:"cat-bt",
    keys:["blood thinner","anticoagulant","clot","thin blood","coagul","bleeding","afib","dvt","embol"],
    note:"Blood thinner (anticoagulant) — used for AFib, DVT, and PE prevention." },
  { name:"Dabigatran",      brand:"Pradaxa",               category:"Blood Thinner", tag:"cat-bt",
    keys:["blood thinner","anticoagulant","clot","thin blood","coagul","bleeding","afib","dvt"],

// ─── State ────────────────────────────────────────────────────────────────────
const score = { correct: 0, total: 0, streak: 0 };
const masteredSet  = new Set();
const drugStats    = {};          // name → { correct: 0, wrong: 0 }
DRUGS.forEach(d => { drugStats[d.name] = { correct: 0, wrong: 0 }; });

let drillMode        = 'category'; // 'category' | 'brand-to-generic' | 'generic-to-brand'
let activeCategories = new Set(['all']);
let queue      = [];
let wrongQueue = [];
let nwProtocolActive = false;

function isSingleCategory() {
  return !activeCategories.has('all') && activeCategories.size === 1;
}
function getGenericKeys(drug) {
  return drug.name.replace(/\(.*?\)/g,'').trim().toLowerCase()
    .split(/\s+/).filter(w => w.length > 2);
}
function getBrandKeys(drug) {
  return drug.brand.toLowerCase().split(/[\/\s]+/)
    .map(b => b.trim()).filter(b => b.length > 2);
}
let currentDrug       = null;
let answered          = false;
let wasShown          = false;
let needsRetry        = false;

// Batch state
let batchQueue        = [];   // drugs left to answer in current batch
let currentBatchDrugs = [];   // the 3 drugs in current batch
let batchHadError     = false;// any wrong first-attempt this batch
let batchesDone       = 0;    // completed batches
let isReviewAll       = false; // true when reviewing all covered so far
let completedDrugs    = [];   // all drugs from all completed batches

// ─── Queue helpers ────────────────────────────────────────────────────────────
function getActiveDrugs() {
  let pool = activeCategories.has('all') ? DRUGS : DRUGS.filter(d => activeCategories.has(d.category));
  if (nwProtocolActive) pool = pool.filter(d => NW_PROTOCOL.has(d.name));
  return pool.filter(d => !masteredSet.has(d.name));
}

function buildQueue() {
  queue = [...getActiveDrugs()].sort(() => Math.random() - 0.5);
}

function startNewBatch(drugsOverride) {
  // drugsOverride: pass an array to review specific drugs, else pull fresh from queue
  if (drugsOverride) {
    currentBatchDrugs = drugsOverride;
  } else {
    if (queue.length === 0) buildQueue();
    currentBatchDrugs = [];
    while (currentBatchDrugs.length < 3 && queue.length > 0) {
      currentBatchDrugs.push(queue.shift());
    }
    if (currentBatchDrugs.length === 0) {
      document.getElementById('main-card').innerHTML =
        `<div class="all-done">🎉 All drugs in this category covered!<br>
         <small style="color:#3a4060;font-size:0.8rem">Switch categories or refresh to keep drilling.</small></div>`;
      document.getElementById('main-card').style.display = 'block';
      document.getElementById('batch-panel').style.display = 'none';
      return;
    }
  }
  batchQueue    = [...currentBatchDrugs].sort(() => Math.random() - 0.5);
  batchHadError = false;
  document.getElementById('main-card').style.display  = 'block';
  document.getElementById('batch-panel').style.display = 'none';
  nextDrug();
}

function batchComplete() {
  batchesDone++;
  completedDrugs.push(...currentBatchDrugs);

  const title  = document.getElementById('batch-title');
  const perf   = document.getElementById('batch-perf');
  const drugs  = document.getElementById('batch-drugs');
  const nextBtn   = document.getElementById('next-batch-btn');
  const reviewBtn = document.getElementById('review-batch-btn');
  const allBtn    = document.getElementById('review-all-btn');

  if (isReviewAll) {
    title.textContent = 'Review complete!';
    drugs.innerHTML   = '';
  } else {
    title.textContent = 'Batch complete!';
    drugs.innerHTML   = currentBatchDrugs
      .map(d => `<span class="batch-drug-pill">${d.name}</span>`).join('');
  }
  isReviewAll     = false;
  title.className = 'batch-title ' + (batchHadError ? 'retry' : 'clean');
  perf.textContent = batchHadError
    ? 'Some drugs needed retry — review to reinforce.'
    : 'All correct first try!';

  if (batchHadError) {
    reviewBtn.className = 'bbtn bbtn-primary';
    nextBtn.className   = 'bbtn bbtn-secondary';
  } else {
    nextBtn.className   = 'bbtn bbtn-primary';
    reviewBtn.className = 'bbtn bbtn-secondary';
  }

  if (batchesDone >= 2) {
    allBtn.style.display = 'block';
    allBtn.textContent   = 'Review all medications covered so far';
  } else {
    allBtn.style.display = 'none';
  }

  document.getElementById('main-card').style.display  = 'none';
  document.getElementById('batch-panel').style.display = 'block';
}

// ─── Display ──────────────────────────────────────────────────────────────────
function nextDrug() {
  answered   = false;
  wasShown   = false;
  needsRetry = false;
  const inp = document.getElementById('answer-input');
  inp.value = ''; inp.className = '';
  document.getElementById('feedback').className  = 'feedback';
  const hintEl = document.getElementById('hint-area');
  hintEl.setAttribute('hidden', '');
  hintEl.innerHTML = '';
  document.getElementById('show-btn').style.display  = 'block';
  document.getElementById('next-btn').style.display  = 'none';
  document.getElementById('check-btn').style.display = 'block';

  if (batchQueue.length === 0) { batchComplete(); return; }

  currentDrug = batchQueue.shift();
  const prompt = document.getElementById('drill-prompt');
  if (drillMode === 'brand-to-generic') {
    document.getElementById('drug-name').textContent  = currentDrug.brand.split('/')[0].trim();
    document.getElementById('drug-brand').textContent = '';
    prompt.textContent = 'What is the generic name?';
  } else if (drillMode === 'generic-to-brand') {
    document.getElementById('drug-name').textContent  = currentDrug.name;
    document.getElementById('drug-brand').textContent = '';
    prompt.textContent = 'What is the brand name?';
  } else {
    document.getElementById('drug-name').textContent  = currentDrug.name;
    document.getElementById('drug-brand').textContent = `Also known as: ${currentDrug.brand}`;
    prompt.textContent = isSingleCategory()
      ? 'What condition specifically does this treat?'
      : 'What is this drug used to treat?';
  }
  inp.focus();
}

// ─── Answer checking ──────────────────────────────────────────────────────────
function checkAnswer() {
  const inp    = document.getElementById('answer-input');
  const answer = inp.value.toLowerCase().trim();
  if (!answer) { inp.focus(); return; }

  let correct, tag, answerNote;
  const fb = document.getElementById('feedback');
  if (drillMode === 'brand-to-generic') {
    correct    = getGenericKeys(currentDrug).some(k => answer.includes(k));
    tag        = `<span class="category-tag ${currentDrug.tag}">${currentDrug.name}</span>`;
    answerNote = `<div class="explanation">Generic: <strong>${currentDrug.name}</strong> | ${currentDrug.note}</div>`;
  } else if (drillMode === 'generic-to-brand') {
    correct    = getBrandKeys(currentDrug).some(k => answer.includes(k));
    tag        = `<span class="category-tag ${currentDrug.tag}">${currentDrug.brand}</span>`;
    answerNote = `<div class="explanation">Brand: <strong>${currentDrug.brand}</strong> | ${currentDrug.note}</div>`;
  } else {
    const keys = (isSingleCategory() && CONDITIONS[currentDrug.name])
      ? CONDITIONS[currentDrug.name]
      : currentDrug.keys;
    correct    = keys.some(kw => answer.includes(kw.toLowerCase()));
    tag        = `<span class="category-tag ${currentDrug.tag}">${currentDrug.category}</span>`;
    answerNote = `<div class="explanation">${currentDrug.note}</div>`;
  }

  // ── Retry mode: wrong on first attempt, must type correctly to advance ──
  if (needsRetry) {
    if (correct) {
      needsRetry    = false;
      inp.className = 'correct';
      fb.className  = 'feedback correct';
      fb.innerHTML  = `✓ Got it! ${tag}${answerNote}`;
      document.getElementById('hint-area').setAttribute('hidden', '');
      document.getElementById('check-btn').style.display = 'none';
      document.getElementById('next-btn').style.display  = 'block';
    } else {
      inp.className = 'wrong';
      setTimeout(() => { inp.value = ''; inp.className = ''; inp.focus(); }, 400);
    }
    return;
  }

  if (answered) return;
  answered = true;
  score.total++;

  if (correct && !wasShown) {
    score.correct++;
    score.streak++;
    drugStats[currentDrug.name].correct++;
    inp.className = 'correct';
    fb.className  = 'feedback correct';
    fb.innerHTML  = `✓ Correct! ${tag}${answerNote}`;
    if (drugStats[currentDrug.name].correct >= 3 && drugStats[currentDrug.name].wrong === 0) {
      masteredSet.add(currentDrug.name);
    }
    updateScore();
    document.getElementById('show-btn').style.display  = 'none';
    document.getElementById('check-btn').style.display = 'none';
    document.getElementById('next-btn').style.display  = 'block';

  } else if (correct && wasShown) {
    score.streak = 0;
    drugStats[currentDrug.name].wrong++;
    drugStats[currentDrug.name].correct = 0;
    inp.className = 'wrong';
    fb.className  = 'feedback wrong';
    fb.innerHTML  = `Answer shown — marked as incorrect. ${tag}${answerNote}`;
    document.getElementById('hint-area').setAttribute('hidden', '');
    batchHadError = true;
    updateScore();
    document.getElementById('show-btn').style.display  = 'none';
    document.getElementById('check-btn').style.display = 'none';
    document.getElementById('next-btn').style.display  = 'block';

  } else {
    // Wrong — mark score, enter retry mode
    score.streak = 0;
    drugStats[currentDrug.name].wrong++;
    drugStats[currentDrug.name].correct = 0;
    batchHadError = true;
    batchQueue.push(currentDrug); // re-add to batch so they see it again
    fb.className = 'feedback wrong';
    fb.innerHTML = `✗ Not quite. ${tag}${answerNote}
                   <div class="retry-prompt">Type the correct answer to continue →</div>`;
    needsRetry = true;
    updateScore();
    document.getElementById('show-btn').style.display  = 'none';
    document.getElementById('check-btn').style.display = 'none';
    setTimeout(() => { inp.value = ''; inp.className = ''; inp.focus(); }, 400);
  }
}

function updateScore() {
  document.getElementById('val-correct').textContent  = score.correct;
  document.getElementById('val-total').textContent    = score.total;
  document.getElementById('val-streak').textContent   = score.streak;
  document.getElementById('val-mastered').textContent = masteredSet.size;
  document.getElementById('progress-text').textContent =
    `${masteredSet.size} of ${TOTAL} mastered`;
  document.getElementById('progress-fill').style.width =
    `${(masteredSet.size / TOTAL * 100).toFixed(1)}%`;
}

// ─── Events ───────────────────────────────────────────────────────────────────
document.getElementById('check-btn').addEventListener('click', checkAnswer);
document.getElementById('next-btn').addEventListener('click', nextDrug);

document.getElementById('show-btn').addEventListener('click', () => {
  if (answered) return;
  wasShown = true;
  const hint = document.getElementById('hint-area');
  const tag  = `<span class="category-tag ${currentDrug.tag}">${currentDrug.category}</span>`;
  const info = `${tag}<div class="explanation">${currentDrug.note}</div>`;

  if (drillMode === 'brand-to-generic') {
    hint.innerHTML = `<div class="hint-answer">${currentDrug.name}</div>${info}`;
  } else if (drillMode === 'generic-to-brand') {
    hint.innerHTML = `<div class="hint-answer">${currentDrug.brand}</div>${info}`;
  } else {
    hint.innerHTML = info;
  }

  hint.removeAttribute('hidden');
  document.getElementById('show-btn').style.display = 'none';
  document.getElementById('answer-input').focus();
});

document.getElementById('answer-input').addEventListener('keydown', e => {
  if (e.key !== 'Enter') return;
  if (needsRetry) { checkAnswer(); return; }
  if (!answered) checkAnswer();
  else nextDrug();
});

// ─── NW Protocol toggle ───────────────────────────────────────────────────────
document.getElementById('nw-btn').addEventListener('click', () => {
  nwProtocolActive = !nwProtocolActive;
  document.getElementById('nw-btn').classList.toggle('active', nwProtocolActive);
  const activeTop = document.querySelector('.mode-btn.active')?.dataset.top;
  if (activeTop === 'sort') {
    sortMastered.clear(); sortBatchesDone = 0; sortCompletedDrugs = [];
    buildSortQueue(); startSortBatch();
  } else {
    wrongQueue = []; completedDrugs = []; batchesDone = 0;
    buildQueue(); startNewBatch();
  }
});

function collapseFilters() {
  document.getElementById('filters').style.display = 'none';
  const ftb = document.getElementById('filter-toggle-btn');
  ftb.textContent = 'Filter by category ▾';
  ftb.classList.remove('open');
}

function showDrillUI()  {
  document.getElementById('main-card').style.display   = 'block';
  document.getElementById('batch-panel').style.display = 'none';
  document.getElementById('sort-panel').style.display  = 'none';
  document.getElementById('progress-area').style.display = 'block';
}
function showSortUI() {
  document.getElementById('main-card').style.display   = 'none';
  document.getElementById('batch-panel').style.display = 'none';
  document.getElementById('sort-panel').style.display  = 'block';
  document.getElementById('progress-area').style.display = 'none';
}

document.getElementById('mode-toggle').addEventListener('click', e => {
  const btn = e.target.closest('.mode-btn');
  if (!btn) return;
  const top = btn.dataset.top;
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const isNames = top === 'names';
  const isSort  = top === 'sort';
  document.getElementById('sub-toggle').style.display        = isNames ? 'flex' : 'none';
  document.getElementById('filter-toggle-row').style.display = isNames ? 'flex' : 'none';
  collapseFilters();
  if (isSort) {
    showSortUI();
    sortMastered.clear(); sortBatchesDone = 0; sortCompletedDrugs = [];
    buildSortQueue(); startSortBatch();
    return;
  }
  showDrillUI();
  drillMode = isNames
    ? (document.querySelector('.sub-btn.active')?.dataset.mode || 'brand-to-generic')
    : 'category';
  wrongQueue = []; completedDrugs = []; batchesDone = 0;
  buildQueue(); startNewBatch();
});

document.getElementById('sub-toggle').addEventListener('click', e => {
  const btn = e.target.closest('.sub-btn');
  if (!btn) return;
  document.querySelectorAll('.sub-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  drillMode = btn.dataset.mode;
  collapseFilters();
  wrongQueue = []; completedDrugs = []; batchesDone = 0;
  buildQueue(); startNewBatch();
});

document.getElementById('filter-toggle-btn').addEventListener('click', () => {
  const filters = document.getElementById('filters');
  const btn = document.getElementById('filter-toggle-btn');
  const open = filters.style.display === 'flex';
  filters.style.display = open ? 'none' : 'flex';
  btn.textContent = open ? 'Filter by category ▾' : 'Filter by category ▴';
  btn.classList.toggle('open', !open);
});

document.getElementById('next-batch-btn').addEventListener('click', () => startNewBatch());
document.getElementById('review-batch-btn').addEventListener('click', () => startNewBatch(currentBatchDrugs));
document.getElementById('review-all-btn').addEventListener('click', () => {
  // Review all completed drugs — treat as a fresh batch but with all covered drugs
  const saved = currentBatchDrugs;
  currentBatchDrugs = [...completedDrugs];
  batchQueue    = [...completedDrugs].sort(() => Math.random() - 0.5);
  batchHadError = false;
  isReviewAll   = true;
  document.getElementById('main-card').style.display  = 'block';
  document.getElementById('batch-panel').style.display = 'none';
  // After this review, batchComplete will show the panel with currentBatchDrugs = all
  // We want to restore the last batch as "this batch" after the all-review is done
  // so we track what "current batch" was
  nextDrug();
});

document.getElementById('filters').addEventListener('click', e => {
  const btn = e.target.closest('.filter-btn');
  if (!btn) return;
  const cat = btn.dataset.cat;

  if (cat === 'all') {
    activeCategories = new Set(['all']);
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  } else {
    document.querySelector('.filter-btn[data-cat="all"]').classList.remove('active');
    activeCategories.delete('all');
    if (activeCategories.has(cat)) {
      activeCategories.delete(cat);
      btn.classList.remove('active');
    } else {
      activeCategories.add(cat);
      btn.classList.add('active');
    }
    if (activeCategories.size === 0) {
      activeCategories.add('all');
      document.querySelector('.filter-btn[data-cat="all"]').classList.add('active');
    }
  }

  wrongQueue = [];
  completedDrugs = [];
  batchesDone = 0;
  buildQueue();
  startNewBatch();
});

// ─── Sort Mode ────────────────────────────────────────────────────────────────
const ALL_CATEGORIES = [
  { label: '🩸 Blood Thinners',  cat: 'Blood Thinner' },
  { label: '🫀 Antiplatelets',   cat: 'Antiplatelet' },
  { label: '❤️ Heart / BP',     cat: 'Heart / BP' },
  { label: '🩺 Diabetes',        cat: 'Diabetes' },
  { label: '🧠 Psychiatric',     cat: 'Psychiatric' },
  { label: '⚡ Seizure',         cat: 'Seizure' },
  { label: '😮‍💨 Respiratory',    cat: 'Respiratory' },
  { label: '💊 Pain',            cat: 'Pain' },
  { label: '📊 Cholesterol',     cat: 'Cholesterol' },
  { label: '🦋 Thyroid',         cat: 'Thyroid' },
  { label: '🫃 GI / Stomach',    cat: 'GI / Stomach' },
  { label: '🤧 Allergy',         cat: 'Allergy' },
  { label: '🚨 Cardiac / Arrest',cat: 'Cardiac / Arrest' },
  { label: '💊 Analgesics',      cat: 'Analgesics' },
  { label: '😴 Sedation / RSI',  cat: 'Sedation / RSI' },
  { label: '🧪 Tox / Metabolic', cat: 'Tox / Metabolic' },
  { label: '🩸 Hemostasis / OB', cat: 'Hemostasis / OB' },
];

let sortCategories     = new Set(['all']);
let sortQueue          = [];
let sortCurrentDrug    = null;
let sortBatchQueue     = [];
let sortCurrentBatch   = [];
let sortBatchHadError  = false;
let sortBatchesDone    = 0;
let sortCompletedDrugs = [];
let sortIsReviewAll    = false;
const sortMastered     = new Set();

function getSortDrugs() {
  let pool = sortCategories.has('all') ? DRUGS : DRUGS.filter(d => sortCategories.has(d.category));
  if (nwProtocolActive) pool = pool.filter(d => NW_PROTOCOL.has(d.name));
  return pool.filter(d => !sortMastered.has(d.name));
}

function buildSortQueue() {
  sortQueue = [...getSortDrugs()].sort(() => Math.random() - 0.5);
}

function startSortBatch(override) {
  const source = override || sortQueue;
  sortCurrentBatch = [];
  while (sortCurrentBatch.length < 3 && source.length > 0) {
    sortCurrentBatch.push(source.shift());
  }
  if (sortCurrentBatch.length === 0) {
    document.getElementById('sort-drug-card').innerHTML =
      `<div class="all-done">🎉 All drugs mastered!<br>
       <button class="bbtn bbtn-primary" id="sort-drill-again-btn" style="margin-top:16px">↩ Drill Again</button>
       </div>`;
    document.getElementById('sort-drug-card').style.display = 'block';
    document.getElementById('sort-grid').innerHTML = '';
    document.getElementById('sort-grid').style.display = 'none';
    document.getElementById('sort-batch-panel').style.display = 'none';
    document.getElementById('sort-drill-again-btn').addEventListener('click', () => {
      sortMastered.clear();
      sortBatchesDone = 0;
      sortCompletedDrugs = [];
      buildSortQueue();
      startSortBatch();
    });
    return;
  }
  sortBatchQueue   = [...sortCurrentBatch].sort(() => Math.random() - 0.5);
  sortBatchHadError = false;
  // Restore card inner HTML in case it was replaced by the all-done screen
  document.getElementById('sort-drug-card').innerHTML =
    `<div class="sort-drug-name" id="sort-drug-name">—</div>
     <div class="sort-drug-brand" id="sort-drug-brand"></div>
     <div class="sort-prompt">Which category does this drug belong to?</div>`;
  document.getElementById('sort-batch-panel').style.display = 'none';
  document.getElementById('sort-drug-card').style.display   = 'block';
  document.getElementById('sort-grid').style.display        = 'grid';
  document.getElementById('sort-feedback').style.display    = 'none';
  document.getElementById('sort-next-btn').style.display    = 'none';
  nextSortDrug();
}

function nextSortDrug() {
  if (sortBatchQueue.length === 0) { sortBatchComplete(); return; }
  sortCurrentDrug = sortBatchQueue.shift();
  document.getElementById('sort-drug-name').textContent  = sortCurrentDrug.name;
  document.getElementById('sort-drug-brand').textContent = sortCurrentDrug.brand ? `(${sortCurrentDrug.brand})` : '';
  document.getElementById('sort-feedback').style.display = 'none';
  document.getElementById('sort-next-btn').style.display = 'none';
  renderSortGrid(false);
}

function renderSortGrid(answered) {
  const grid = document.getElementById('sort-grid');
  const visible = sortCategories.has('all')
    ? ALL_CATEGORIES
    : ALL_CATEGORIES.filter(c => sortCategories.has(c.cat));
  grid.innerHTML = visible.map(c =>
    `<button class="sort-cat-btn" data-cat="${c.cat}" ${answered ? 'disabled' : ''}>${c.label}</button>`
  ).join('');
}

document.getElementById('sort-grid').addEventListener('click', e => {
  const btn = e.target.closest('.sort-cat-btn');
  if (!btn || btn.disabled) return;
  const chosen  = btn.dataset.cat;
  const correct = sortCurrentDrug.category;
  const isRight = chosen === correct;

  if (isRight) {
    // disable all
    document.querySelectorAll('.sort-cat-btn').forEach(b => b.disabled = true);
    btn.classList.add('correct');
    document.getElementById('sort-feedback').className = 'sort-feedback correct';
    document.getElementById('sort-feedback').textContent = `✓ Correct! ${sortCurrentDrug.name} is a ${correct}.`;
    document.getElementById('sort-feedback').style.display = 'block';
    setTimeout(() => nextSortDrug(), 900);
  } else {
    // disable all except the correct one
    document.querySelectorAll('.sort-cat-btn').forEach(b => {
      if (b.dataset.cat === correct) {
        b.classList.add('correct');
      } else {
        b.disabled = true;
        if (b.dataset.cat === chosen) b.classList.add('wrong');
      }
    });
    sortBatchHadError = true;
    sortBatchQueue.push(sortCurrentDrug);
    document.getElementById('sort-feedback').className = 'sort-feedback wrong';
    document.getElementById('sort-feedback').textContent =
      `✗ ${sortCurrentDrug.name} is a ${correct}, not ${chosen}. Click the correct category to continue.`;
    document.getElementById('sort-feedback').style.display = 'block';
  }
});

document.getElementById('sort-next-btn').addEventListener('click', nextSortDrug);

function sortBatchComplete() {
  sortBatchesDone++;
  // Add only drugs not already tracked (prevents duplicates from repeated batches)
  const seenNames = new Set(sortCompletedDrugs.map(d => d.name));
  sortCurrentBatch.forEach(d => { if (!seenNames.has(d.name)) sortCompletedDrugs.push(d); });
  sortCurrentBatch.forEach(d => sortMastered.add(d.name));

  const title    = document.getElementById('sort-batch-title');
  const perf     = document.getElementById('sort-batch-perf');
  const drugs    = document.getElementById('sort-batch-drugs');
  const nextBtn  = document.getElementById('sort-next-batch-btn');
  const revBtn   = document.getElementById('sort-review-batch-btn');
  const allBtn   = document.getElementById('sort-review-all-btn');

  if (sortIsReviewAll) {
    title.textContent = 'Review complete!';
    drugs.innerHTML   = '';
  } else {
    title.textContent = 'Batch complete!';
    drugs.innerHTML   = sortCurrentBatch
      .map(d => `<span class="batch-drug-pill">${d.name}</span>`).join('');
  }
  sortIsReviewAll  = false;
  title.className  = 'batch-title ' + (sortBatchHadError ? 'retry' : 'clean');
  perf.textContent = sortBatchHadError
    ? 'Some needed a retry — keep drilling!'
    : 'All correct first try!';

  if (sortBatchHadError) {
    revBtn.className = 'bbtn bbtn-primary';
    nextBtn.className = 'bbtn bbtn-secondary';
  } else {
    nextBtn.className = 'bbtn bbtn-primary';
    revBtn.className  = 'bbtn bbtn-secondary';
  }

  if (sortBatchesDone >= 2) {
    allBtn.style.display = 'block';
  } else {
    allBtn.style.display = 'none';
  }

  document.getElementById('sort-drug-card').style.display   = 'none';
  document.getElementById('sort-grid').style.display        = 'none';
  document.getElementById('sort-feedback').style.display    = 'none';
  document.getElementById('sort-next-btn').style.display    = 'none';
  document.getElementById('sort-batch-panel').style.display = 'block';
}

document.getElementById('sort-next-batch-btn').addEventListener('click', () => {
  document.getElementById('sort-drug-card').style.display = 'block';
  document.getElementById('sort-grid').style.display      = 'grid';
  buildSortQueue(); startSortBatch();
});
document.getElementById('sort-review-batch-btn').addEventListener('click', () => {
  document.getElementById('sort-drug-card').style.display = 'block';
  document.getElementById('sort-grid').style.display      = 'grid';
  const retry = [...sortCurrentBatch];
  startSortBatch(retry);
});
document.getElementById('sort-review-all-btn').addEventListener('click', () => {
  sortIsReviewAll  = true;
  sortCurrentBatch = [...sortCompletedDrugs];
  // Restore card HTML so sort-drug-name / sort-drug-brand elements exist
  document.getElementById('sort-drug-card').innerHTML =
    `<div class="sort-drug-name" id="sort-drug-name">—</div>
     <div class="sort-drug-brand" id="sort-drug-brand"></div>
     <div class="sort-prompt">Which category does this drug belong to?</div>`;
  document.getElementById('sort-drug-card').style.display   = 'block';
  document.getElementById('sort-grid').style.display        = 'grid';
  document.getElementById('sort-feedback').style.display    = 'none';
  document.getElementById('sort-next-btn').style.display    = 'none';
  document.getElementById('sort-batch-panel').style.display = 'none';
  sortBatchQueue    = [...sortCompletedDrugs].sort(() => Math.random() - 0.5);
  sortBatchHadError = false;
  nextSortDrug();
});

// Sort filter pills
document.getElementById('sort-filters').addEventListener('click', e => {
  const btn = e.target.closest('.sort-filter-btn');
  if (!btn) return;
  const cat = btn.dataset.cat;
  if (cat === 'all') {
    sortCategories = new Set(['all']);
    document.querySelectorAll('.sort-filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  } else {
    document.querySelector('.sort-filter-btn[data-cat="all"]').classList.remove('active');
    if (sortCategories.has(cat)) {
      sortCategories.delete(cat);
      btn.classList.remove('active');
    } else {
      sortCategories.add(cat);
      btn.classList.add('active');
      sortCategories.delete('all');
    }
    if (sortCategories.size === 0) {
      sortCategories = new Set(['all']);
      document.querySelector('.sort-filter-btn[data-cat="all"]').classList.add('active');
    }
  }
  sortBatchesDone = 0; sortCompletedDrugs = [];
  buildSortQueue(); startSortBatch();
});

// ─── Start ────────────────────────────────────────────────────────────────────
document.getElementById('filters').style.display = 'none';
buildQueue();
startNewBatch();
</script>
</body>
</html>
